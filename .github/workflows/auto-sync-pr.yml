name: Auto Sync and PR to Upstream

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open Pull Request using GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Uses the built-in repository token
        run: |
          gh pr create \
            --repo "Autoraimix/QAPulse" \
            --head "syamilsamat:main" \
            --base "main" \
            --title "SAS: fix/improve code" \
            --body "Automated code improvement sync from syamil." || echo "PR already exists or no changes to sync."
